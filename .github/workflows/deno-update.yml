name: Deno Update

# Weekly automated bump of deno.json deps via `deno outdated --update`.
# Patch-only PRs are labeled `auto-merge` so the label-driven auto-merge
# workflow can land them without human intervention. Minor/major bumps
# stay open for review and only get the `dependencies` label.
on:
  schedule:
    # Mondays at 14:00 UTC.
    - cron: '0 14 * * 1'
  workflow_dispatch:

concurrency:
  group: deno-update
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: [self-hosted, aur0]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run deno outdated --update
        run: deno outdated --update

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- deno.json deno.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No deno.json/deno.lock changes; nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff -- deno.json | head -200
          fi

      - name: Check formatting
        if: steps.diff.outputs.changed == 'true'
        run: deno fmt ./src --check

      - name: Lint
        if: steps.diff.outputs.changed == 'true'
        run: deno lint ./src

      - name: Lint JSDoc
        if: steps.diff.outputs.changed == 'true'
        run: deno doc --lint ./src

      - name: Type check
        if: steps.diff.outputs.changed == 'true'
        run: deno check ./src

      - name: Tests
        if: steps.diff.outputs.changed == 'true'
        run: deno test -A ./tests -q

      - name: Classify bump (patch vs minor/major)
        if: steps.diff.outputs.changed == 'true'
        id: classify
        run: |
          git --no-pager diff -- deno.json > /tmp/denojson.diff
          kind=$(deno run --allow-read=/tmp/denojson.diff - <<'TS'
          // Classify a deno.json diff as `patch` (only patch bumps), `mixed`
          // (any minor/major bump), or `unknown` (couldn't extract any
          // version pairs). Used to gate `auto-merge` labeling.
          const text = await Deno.readTextFile('/tmp/denojson.diff');
          const verRe = /@\^?~?(\d+)\.(\d+)\.(\d+)(?:[-+][\w.]+)?(?=["\s,}])/g;
          const olds: [number, number, number][] = [];
          const news: [number, number, number][] = [];
          for (const ln of text.split('\n')) {
            if (ln.startsWith('---') || ln.startsWith('+++')) continue;
            const target = ln.startsWith('-') ? olds : ln.startsWith('+') ? news : null;
            if (!target) continue;
            for (const m of ln.matchAll(verRe)) {
              target.push([Number(m[1]), Number(m[2]), Number(m[3])]);
            }
          }
          let kind: string;
          if (olds.length === 0 || news.length === 0) {
            kind = 'unknown';
          } else if (olds.length !== news.length) {
            kind = 'mixed';
          } else {
            let allPatch = true;
            for (let i = 0; i < olds.length; i++) {
              const [oM, om, op] = olds[i];
              const [nM, nm, np] = news[i];
              if (oM === nM && om === nm && op === np) continue;
              if (oM !== nM || om !== nm) { allPatch = false; break; }
            }
            kind = allPatch ? 'patch' : 'mixed';
          }
          await Deno.stdout.write(new TextEncoder().encode(kind));
          TS
          )
          echo "kind=$kind" >> "$GITHUB_OUTPUT"
          echo "Classified bump kind: $kind"

      - name: Build PR body
        if: steps.diff.outputs.changed == 'true'
        run: |
          {
            echo 'Automated dependency bump produced by `deno outdated --update`.'
            echo
            echo '## deno.json diff'
            echo
            echo '```diff'
            git --no-pager diff -- deno.json
            echo '```'
            echo
            echo "Bump classification: \`${{ steps.classify.outputs.kind }}\`"
            echo
            if [ "${{ steps.classify.outputs.kind }}" = "patch" ]; then
              echo 'Patch-only bump: labeled `auto-merge` so the label-driven auto-merge workflow will land it once gates are green.'
            else
              echo 'Contains minor/major bumps: labeled `dependencies` only and left for human review.'
            fi
          } > /tmp/pr_body.md

      - name: Ensure labels exist
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create auto-merge --color 0E8A16 --description "Auto-merge once required checks pass" --force
          gh label create dependencies --color 0366D6 --description "Pull requests that update a dependency file" --force

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          date_tag=$(date -u +%Y-%m-%d)
          branch="chore/deno-update-${date_tag}"

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            branch="chore/deno-update-${date_tag}-${{ github.run_id }}"
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -b "$branch"
          git add deno.json deno.lock
          git commit -m 'chore(deps): deno outdated --update'
          git push origin "$branch"

          if [ "${{ steps.classify.outputs.kind }}" = "patch" ]; then
            labels='auto-merge,dependencies'
          else
            labels='dependencies'
          fi

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(deps): deno outdated --update (${date_tag})" \
            --body-file /tmp/pr_body.md \
            --label "$labels"
